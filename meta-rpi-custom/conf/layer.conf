# We have a conf and classes directory, add them to BBPATH
BBPATH .= ":${LAYERDIR}"

# We have recipes-* directories, add them to BBFILES
BBFILES += "${LAYERDIR}/recipes-*/*/*.bb \
            ${LAYERDIR}/recipes-*/*/*.bbappend"

BBFILE_COLLECTIONS += "rpi-custom"
BBFILE_PATTERN_rpi-custom = "^${LAYERDIR}/"
BBFILE_PRIORITY_rpi-custom = "9"

LAYERDEPENDS_rpi-custom = "raspberrypi"

LAYERSERIES_COMPAT_rpi-custom = "scarthgap"
