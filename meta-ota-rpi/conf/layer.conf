# We have a conf and classes directory, add to BBPATH
BBPATH .= ":${LAYERDIR}"

# We have recipes-* directories, add to BBFILES
BBFILES += "${LAYERDIR}/recipes-*/*/*.bb \
            ${LAYERDIR}/recipes-*/*/*.bbappend"

BBFILE_COLLECTIONS += "meta-ota-rpi"
BBFILE_PATTERN_meta-ota-rpi = "^${LAYERDIR}/"
BBFILE_PRIORITY_meta-ota-rpi = "6"

LAYERDEPENDS_meta-ota-rpi = "core"
LAYERSERIES_COMPAT_meta-ota-rpi = "scarthgap"
